<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Thank You | Sandlin Signature</title>
<meta name="description" content="Thanks for reaching out to Sandlin Signature. We will follow up soon.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;500&family=Montserrat:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  --charcoal: #1C1C1C;
  --sand: #C4A882;
  --linen: #F5F5F0;
  --oak: #A08860;
}
*, *::before, *::after { box-sizing: border-box; }
html, body { margin: 0; min-height: 100%; }
body {
  font-family: 'Montserrat', sans-serif;
  background: linear-gradient(180deg, #1c1c1c 0%, #2a2622 100%);
  color: var(--linen);
  display: grid;
  place-items: center;
  padding: 32px 20px;
}
.card {
  width: min(760px, 100%);
  border: 1px solid rgba(196,168,130,0.28);
  background: rgba(245,245,240,0.06);
  padding: 40px;
  text-align: center;
  box-shadow: 0 24px 80px rgba(0,0,0,0.28);
}
.eyebrow {
  display: block;
  font-family: 'Cinzel', serif;
  letter-spacing: 0.25em;
  text-transform: uppercase;
  color: var(--sand);
  font-size: 11px;
  margin-bottom: 18px;
}
h1 {
  font-family: 'Cinzel', serif;
  font-size: clamp(32px, 4vw, 54px);
  font-weight: 400;
  margin: 0 0 16px;
}
p {
  margin: 0 auto 24px;
  max-width: 560px;
  color: rgba(245,245,240,0.72);
  line-height: 1.8;
  font-size: 15px;
}
a {
  display: inline-block;
  text-decoration: none;
  background: var(--sand);
  color: var(--charcoal);
  padding: 14px 28px;
  font-size: 11px;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  font-weight: 700;
}
a:hover { background: var(--oak); color: var(--linen); }
</style>
</head>
<body>
  <main class="card">
    <span class="eyebrow">Thank You</span>
    <h1>We Got Your Message</h1>
    <p>Thanks for reaching out to Sandlin Signature. We will review your note and follow up as soon as we can. If this is urgent, you can also call or text us directly.</p>
    <a href="https://sandlinsignature.com/">Back to the Website</a>
  </main>
</body>
</html>
